<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 92" role="img" aria-labelledby="title desc">
  <title id="title">UQ Course Select Helper logo</title>
  <desc id="desc">Independent student prototype logo with a compass, book and check mark.</desc>
  <defs>
    <linearGradient id="badgeGradient" x1="8" y1="8" x2="78" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#180812"/>
      <stop offset="0.52" stop-color="#8F2354"/>
      <stop offset="1" stop-color="#FF4FA3"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#050305" flood-opacity="0.28"/>
    </filter>
  </defs>
  <g filter="url(#softShadow)">
    <rect x="10" y="10" width="72" height="72" rx="20" fill="url(#badgeGradient)"/>
    <path d="M28 30c8-4 18-4 26 0v30c-8-4-18-4-26 0V30Z" fill="#FFFFFF" opacity="0.94"/>
    <path d="M54 30c5.5-2.7 12.1-3.6 18-1.4v30c-5.9-2.2-12.5-1.3-18 1.4V30Z" fill="#FFE5F1"/>
    <path d="M34 47l8 8 17-20" fill="none" stroke="#12070F" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="64" cy="28" r="5" fill="#FFB1D3"/>
  </g>
  <g fill="#FFFFFF">
    <text x="102" y="39" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" letter-spacing="1.2">UQ COURSE</text>
    <text x="102" y="66" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" letter-spacing="1.2">SELECT HELPER</text>
  </g>
  <text x="103" y="83" fill="#FFD4E8" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="1.7">STUDENT MVP PROTOTYPE</text>
</svg>
